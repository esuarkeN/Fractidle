name: Build, Push, GitOps Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        run: echo "TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build+Push client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/esuarken/fractidle:${{ env.TAG }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update k8s manifests to new tags
        run: |
          export CLIENT_IMAGE="ghcr.io/esuarken/fractidle:${TAG}"

          yq -i '.spec.template.spec.containers[0].image = strenv(CLIENT_IMAGE)' k8s/client-deployment.yaml

          git diff -- k8s/client-deployment.yaml || true

      - name: Commit+Push (GitOps)
        run: |
          if git diff --quiet; then
            echo "No manifest changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/client-deployment.yaml
          git commit -m "chore(deploy): ${TAG}"
          git push
