apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fractidle
  namespace: flux-system
spec:
  interval: 1m
  path: ./k8s
  prune: true
  timeout: 5m
  wait: false
  targetNamespace: fractidle
  serviceAccountName: fractidle-reconciler
  sourceRef:
    kind: GitRepository
    name: fractidle-repo
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: fractidle-client
      namespace: fractidle
