apiVersion: v1
kind: ServiceAccount
metadata:
  name: fractidle-reconciler
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fractidle-deployer
  namespace: fractidle
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io"]
    resources:
      - configmaps
      - secrets
      - services
      - endpoints
      - pods
      - persistentvolumeclaims
      - deployments
      - replicasets
      - statefulsets
      - jobs
      - cronjobs
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fractidle-deployer
  namespace: fractidle
subjects:
  - kind: ServiceAccount
    name: fractidle-reconciler
    namespace: flux-system
roleRef:
  kind: Role
  name: fractidle-deployer
  apiGroup: rbac.authorization.k8s.io
