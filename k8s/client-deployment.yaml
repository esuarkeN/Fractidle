apiVersion: apps/v1
kind: Deployment
metadata:
  name: fractidle-client
  namespace: fractidle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fractidle-client
  template:
    metadata:
      labels:
        app: fractidle-client
    spec:
      containers:
        - name: client
          image: ghcr.io/esuarken/fractidle:sha-local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fractidle-client
  namespace: fractidle
spec:
  selector:
    app: fractidle-client
  ports:
    - name: http
      port: 80
      targetPort: 80
